  .btn-primary:hover{background:#D4B97A}
  .btn-outline{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:14px;font-weight:500;padding:14px 28px;border-radius:3px;text-decoration:none;transition:all .2s}
