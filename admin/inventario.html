<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Movimiento — Mundo Hogar Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="sidebar-brand-icon">🏠</div><div class="sidebar-brand-text"><span class="sidebar-brand-name">Mundo Hogar</span><span class="sidebar-brand-sub">Panel Admin</span></div></div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer"><div class="sidebar-user"><div class="sidebar-avatar" id="user-avatar">?</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="user-name">Cargando...</div><div class="sidebar-user-role" id="user-role"></div></div></div></div>
  </aside>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <div class="main-wrap">
    <header class="main-header">
      <button class="header-toggle" id="sidebar-toggle">☰</button>
      <span class="header-title" id="page-title"></span>
      <div class="header-actions">
        <a href="/admin/movimientos.html" class="btn btn-ghost btn-sm">Ver historial</a>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Salir</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div><h1>Registrar Movimiento de Stock</h1><p>Entrada, salida o ajuste de inventario</p></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

        <!-- Formulario de movimiento -->
        <div class="card">
          <div class="card-header"><span class="card-title">Datos del movimiento</span></div>
          <div class="card-body">
            <form id="mov-form" class="form-grid" style="gap:16px" novalidate>

              <div class="form-group">
                <label>Tipo de movimiento <span class="req">*</span></label>
                <select id="tipo" required>
                  <optgroup label="Entradas (+)">
                    <option value="entrada_compra">📥 Entrada por compra</option>
                    <option value="devolucion_cliente">↩️ Devolución de cliente</option>
                    <option value="ajuste_positivo">➕ Ajuste positivo</option>
                    <option value="carga_inicial">🔄 Carga inicial / corrección</option>
                  </optgroup>
                  <optgroup label="Salidas (−)">
                    <option value="salida_venta">📤 Salida por venta</option>
                    <option value="devolucion_proveedor">↪️ Devolución a proveedor</option>
                    <option value="producto_danado">💔 Producto dañado</option>
                    <option value="perdida">❌ Pérdida / merma</option>
                    <option value="ajuste_negativo">➖ Ajuste negativo</option>
                  </optgroup>
                  <optgroup label="Neutros">
                    <option value="transferencia">🔃 Transferencia</option>
                    <option value="correccion">✏️ Corrección de stock</option>
                  </optgroup>
                </select>
              </div>

              <div class="form-group">
                <label>Producto <span class="req">*</span></label>
                <div class="search-bar" style="margin-bottom:6px">
                  <span class="search-icon">🔍</span>
                  <input type="search" id="prod-search" placeholder="Buscar producto por nombre o SKU...">
                </div>
                <select id="producto_id" size="5" style="min-height:120px" required>
                  <option value="">— Buscá y seleccioná un producto —</option>
                </select>
              </div>

              <!-- Info del producto seleccionado -->
              <div id="prod-info" style="display:none;background:var(--bg);border-radius:var(--r);padding:14px">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div id="prod-info-nombre" style="font-weight:600;font-size:14px"></div>
                  <div style="text-align:right">
                    <div style="font-size:11px;color:var(--muted)">Stock actual</div>
                    <div id="prod-info-stock" style="font-size:22px;font-weight:700"></div>
                  </div>
                </div>
                <div id="prod-info-sku" style="font-size:12px;color:var(--muted);margin-top:4px"></div>
              </div>

              <div class="form-group">
                <label>Cantidad <span class="req">*</span></label>
                <input type="number" id="cantidad" placeholder="0" min="1" step="1" required>
                <span class="form-hint" id="cant-hint">Ingresá la cantidad a mover (siempre positiva)</span>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group">
                  <label>Motivo</label>
                  <input type="text" id="motivo" placeholder="Ej: Reposición semanal">
                </div>
                <div class="form-group">
                  <label>N° Referencia</label>
                  <input type="text" id="referencia" placeholder="Ej: Factura A-0001">
                </div>
              </div>

              <div class="form-group">
                <label>Observaciones</label>
                <textarea id="observacion" placeholder="Notas adicionales..." style="min-height:60px"></textarea>
              </div>

              <!-- Preview del resultado -->
              <div id="preview-result" style="display:none;background:var(--bg);border-radius:var(--r);padding:14px">
                <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">Resultado del movimiento</div>
                <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;text-align:center">
                  <div><div style="font-size:11px;color:var(--muted)">Antes</div><div id="prev-antes" style="font-size:24px;font-weight:700"></div></div>
                  <div id="prev-arrow" style="font-size:20px;color:var(--muted)">→</div>
                  <div><div style="font-size:11px;color:var(--muted)">Después</div><div id="prev-despues" style="font-size:24px;font-weight:700"></div></div>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg" id="btn-registrar" style="width:100%;justify-content:center">
                Registrar movimiento
              </button>

            </form>
          </div>
        </div>

        <!-- Últimos movimientos del día -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Movimientos de hoy</span>
            <a href="/admin/movimientos.html" class="btn btn-ghost btn-sm">Ver historial completo</a>
          </div>
          <div id="mov-hoy-body">
            <div class="page-loading"><div class="spinner"></div></div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/supabase-config.js"></script>
<script src="/admin/js/supabase-client.js"></script>
<script src="/admin/js/auth.js"></script>
<script src="/admin/js/utils.js"></script>
<script src="/admin/js/layout.js"></script>
<script>
let allProds = [];
let selectedProd = null;

async function cargarProductos() {
  const { data } = await db.from('productos')
    .select('id,nombre,sku,stock_actual,stock_minimo,seguimiento_inventario')
    .eq('estado','activo').neq('seguimiento_inventario',false)
    .order('nombre');
  allProds = data || [];
  filtrarProductos('');
}

function filtrarProductos(q) {
  const sel = document.getElementById('producto_id');
  const lower = q.toLowerCase();
  const filtered = q ? allProds.filter(p =>
    p.nombre.toLowerCase().includes(lower) || (p.sku||'').toLowerCase().includes(lower)
  ) : allProds;
  sel.innerHTML = filtered.length === 0
    ? '<option value="">Sin resultados</option>'
    : filtered.map(p => `<option value="${p.id}">${p.nombre}${p.sku?' ['+p.sku+']':''}</option>`).join('');
  if (filtered.length === 1) { sel.value = filtered[0].id; updateProdInfo(); }
}

function updateProdInfo() {
  const id = parseInt(document.getElementById('producto_id').value);
  selectedProd = allProds.find(p=>p.id===id) || null;
  const infoEl = document.getElementById('prod-info');
  if (!selectedProd) { infoEl.style.display='none'; return; }
  infoEl.style.display='block';
  document.getElementById('prod-info-nombre').textContent = selectedProd.nombre;
  const sc = Utils.stockClass(selectedProd.stock_actual, selectedProd.stock_minimo);
  document.getElementById('prod-info-stock').className = 'stock-num ' + sc;
  document.getElementById('prod-info-stock').textContent = selectedProd.stock_actual;
  document.getElementById('prod-info-sku').textContent = selectedProd.sku ? 'SKU: ' + selectedProd.sku : '';
  updatePreview();
}

function updatePreview() {
  if (!selectedProd) return;
  const tipo = document.getElementById('tipo').value;
  const qty  = parseInt(document.getElementById('cantidad').value) || 0;
  if (!qty) { document.getElementById('preview-result').style.display='none'; return; }

  const entradas = ['carga_inicial','entrada_compra','ajuste_positivo','devolucion_cliente'];
  const salidas  = ['salida_venta','ajuste_negativo','devolucion_proveedor','producto_danado','perdida'];
  let delta = entradas.includes(tipo) ? qty : salidas.includes(tipo) ? -qty : qty;
  const despues = selectedProd.stock_actual + delta;

  const prev = document.getElementById('preview-result');
  prev.style.display='block';
  document.getElementById('prev-antes').textContent    = selectedProd.stock_actual;
  document.getElementById('prev-antes').className      = 'stock-num ' + Utils.stockClass(selectedProd.stock_actual, selectedProd.stock_minimo);
  document.getElementById('prev-despues').textContent  = despues;
  document.getElementById('prev-despues').className    = 'stock-num ' + Utils.stockClass(despues, selectedProd.stock_minimo);
  document.getElementById('prev-arrow').textContent    = delta >= 0 ? '→' : '→';
  prev.style.borderLeft = `4px solid ${delta>=0?'var(--success)':'var(--danger)'}`;
}

document.getElementById('prod-search')?.addEventListener('input', e => filtrarProductos(e.target.value));
document.getElementById('producto_id')?.addEventListener('change', updateProdInfo);
document.getElementById('tipo')?.addEventListener('change', updatePreview);
document.getElementById('cantidad')?.addEventListener('input', updatePreview);

async function cargarMovHoy() {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const { data } = await db.from('movimientos_inventario')
    .select('id,tipo,cantidad,stock_posterior,created_at,productos(nombre)')
    .gte('created_at', hoy.toISOString())
    .order('created_at',{ascending:false});

  const el = document.getElementById('mov-hoy-body');
  if (!(data||[]).length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><p>Sin movimientos hoy</p></div>';
    return;
  }
  el.innerHTML = '<div>' + data.map(m=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)">
      <div style="flex:1;overflow:hidden">
        <div style="font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.productos?.nombre||'—'}</div>
        <div style="font-size:11px;color:var(--muted)">${Utils.datetime(m.created_at)}</div>
      </div>
      ${Utils.tipoMovBadge(m.tipo)}
      <div style="font-size:12px;text-align:right;min-width:70px">
        <span style="font-weight:600">${m.cantidad > 0 ? '+' : ''}${m.cantidad}</span>
        <div style="color:var(--muted);font-size:11px">→ ${m.stock_posterior}</div>
      </div>
    </div>`).join('') + '</div>';
}

document.getElementById('mov-form')?.addEventListener('submit', async e => {
  e.preventDefault();
  const tipo    = document.getElementById('tipo').value;
  const prodId  = parseInt(document.getElementById('producto_id').value);
  const cantidad= parseInt(document.getElementById('cantidad').value);
  const motivo  = document.getElementById('motivo').value.trim()||null;
  const obs     = document.getElementById('observacion').value.trim()||null;
  const ref     = document.getElementById('referencia').value.trim()||null;

  if (!prodId) { Utils.toast('Seleccioná un producto','warning'); return; }
  if (!cantidad || cantidad < 1) { Utils.toast('La cantidad debe ser al menos 1','warning'); return; }

  const btn = document.getElementById('btn-registrar');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Registrando...';

  const { data, error } = await db.rpc('fn_registrar_movimiento',{
    p_producto_id: prodId, p_tipo: tipo, p_cantidad: cantidad,
    p_motivo: motivo, p_observacion: obs, p_referencia: ref
  });

  btn.disabled=false; btn.textContent='Registrar movimiento';

  if (error) {
    Utils.toast('Error: ' + error.message,'error'); return;
  }

  Utils.toast('Movimiento registrado ✅','success');

  // Actualizar stock local
  if (selectedProd) {
    const idx = allProds.findIndex(p=>p.id===selectedProd.id);
    if (idx>=0 && data) allProds[idx].stock_actual = data.stock_posterior;
    updateProdInfo();
  }

  // Reset form (mantener producto y tipo para agilizar carga)
  document.getElementById('cantidad').value='';
  document.getElementById('motivo').value='';
  document.getElementById('observacion').value='';
  document.getElementById('referencia').value='';
  document.getElementById('preview-result').style.display='none';

  await cargarMovHoy();
  await Utils.log('movement','productos',prodId,`${tipo}: ${cantidad} unidades`);
});

async function initPage() {
  const profile = await Auth.init();
  if (!profile) return;
  if (!['administrador','encargado_stock'].includes(profile.rol)) {
    window.location.href='/admin/dashboard.html'; return;
  }
  await Layout.init('inventario','Registrar Movimiento');
  await Promise.all([cargarProductos(), cargarMovHoy()]);
}
initPage();
</script>
</body>
</html>
